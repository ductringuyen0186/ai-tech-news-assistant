name: Deploy to VPS

# Push-to-main deploy pipeline.
#
# Sequence:
#   1. checkout
#   2. run the existing test suite (mirrors ci.yml's mock-deps mode)
#   3. build & push the backend image to GHCR with tags :main and :<sha>
#   4. SSH into the VPS, run `docker compose pull && up -d`
#   5. run the E2E suite against the live URL
#   6. comment the result on the commit
#
# The E2E gate is currently *blocking*: a red E2E run fails the deploy.
# After the first 3 successful deploys, flip BLOCK_ON_E2E_FAILURE to "false"
# below to switch to alert-only mode (see the env block at the top of the
# `e2e` job).
#
# Required repository secrets:
#   DEPLOY_HOST         - VPS hostname or IP
#   DEPLOY_USER         - SSH user on the VPS (e.g. "deploy")
#   DEPLOY_SSH_KEY      - private SSH key, PEM format
#   DEPLOY_PORT         - optional, defaults to 22
#   DEPLOY_DOMAIN       - optional, public hostname for E2E (e.g. news.example.com)
#                         If unset, the E2E step is skipped with a warning.

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  statuses: write
  pull-requests: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: "3.11"

jobs:
  # ------------------------------------------------------------------ #
  # 1. Tests must pass before we even think about pushing an image.
  # ------------------------------------------------------------------ #
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-asyncio pytest-mock ruff

      - name: Lint
        working-directory: backend
        run: ruff check .

      - name: Run tests
        working-directory: backend
        env:
          OLLAMA_HOST: http://mock-ollama:11434
          USE_MOCK_DATA: "true"
          ANTHROPIC_API_KEY: mock-key-for-ci
        run: |
          # Same fallback strategy as ci.yml: prefer test_ci.py, fall back
          # to import smoke if the suite has been pruned.
          if [ -f test_ci.py ]; then
            python -m pytest test_ci.py -v --tb=short
          else
            python -c "from src.main import app; print('import ok')"
          fi

  # ------------------------------------------------------------------ #
  # 2. Build & push the backend image to GHCR.
  # ------------------------------------------------------------------ #
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_sha_tag: ${{ steps.image_sha.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=long

      - name: Compute :sha tag for downstream steps
        id: image_sha
        run: |
          # docker/metadata-action emits e.g. ghcr.io/owner/repo:sha-<sha>
          # We want one canonical reference; use the long sha tag.
          echo "tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------------------------------ #
  # 3. SSH to the VPS and bounce the stack.
  # ------------------------------------------------------------------ #
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          # set -e: any failure aborts the whole script (no split-brain).
          # We pin the image to the :sha tag for an atomic, traceable deploy.
          script: |
            set -e
            cd /opt/news-aggregator
            export BACKEND_IMAGE="${{ needs.build.outputs.image_sha_tag }}"
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml ps

  # ------------------------------------------------------------------ #
  # 4. E2E against the live URL.
  #
  #    Currently blocking. Once the deploy has been green for ~3 runs,
  #    flip BLOCK_ON_E2E_FAILURE to "false" below to switch to alert-only.
  # ------------------------------------------------------------------ #
  e2e:
    name: Live E2E
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 10
    env:
      BLOCK_ON_E2E_FAILURE: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Skip if DEPLOY_DOMAIN unset
        id: domain_check
        run: |
          if [ -z "${{ secrets.DEPLOY_DOMAIN }}" ]; then
            echo "DEPLOY_DOMAIN secret is unset; skipping live E2E." >&2
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run E2E suite against live URL
        if: steps.domain_check.outputs.skip == 'false'
        id: e2e_run
        continue-on-error: true
        run: |
          python .claude/skills/test-app-e2e/scripts/run_e2e.py \
            --backend "https://${{ secrets.DEPLOY_DOMAIN }}" \
            --frontend "https://${{ secrets.DEPLOY_DOMAIN }}" \
            --skip-pipeline \
            --skip-frontend

      - name: Enforce E2E gate
        if: steps.domain_check.outputs.skip == 'false'
        run: |
          if [ "${{ steps.e2e_run.outcome }}" != "success" ]; then
            if [ "$BLOCK_ON_E2E_FAILURE" = "true" ]; then
              echo "Live E2E failed. Failing the deploy (blocking mode)." >&2
              exit 1
            else
              echo "::warning::Live E2E failed, but BLOCK_ON_E2E_FAILURE=false; continuing."
            fi
          fi

  # ------------------------------------------------------------------ #
  # 5. Comment status on the commit.
  # ------------------------------------------------------------------ #
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [build, deploy, e2e]
    if: always()
    steps:
      - name: Comment on commit
        uses: actions/github-script@v7
        with:
          script: |
            const buildResult = "${{ needs.build.result }}";
            const deployResult = "${{ needs.deploy.result }}";
            const e2eResult = "${{ needs.e2e.result }}";
            const sha = context.sha;
            const runUrl =
              `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}` +
              `/actions/runs/${context.runId}`;
            const body = [
              `**Deploy report** (${sha.substring(0, 7)})`,
              ``,
              `- build: \`${buildResult}\``,
              `- deploy: \`${deployResult}\``,
              `- live E2E: \`${e2eResult}\``,
              ``,
              `[Full run](${runUrl})`,
            ].join("\n");
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
              body,
            });
